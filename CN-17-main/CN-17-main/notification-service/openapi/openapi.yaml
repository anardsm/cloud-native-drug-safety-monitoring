openapi: 3.0.0
info:
  title: Notification Service
  version: "1.0"

paths:
  /health:
    get:
      summary: Check service status
      operationId: app.routes.health
      responses:
        "200":
          description: Service is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /notifications:
    get:
      summary: List all notifications
      operationId: app.routes.list_all
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'

    post:
      summary: Create a new notification
      operationId: app.routes.create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationCreate'
      responses:
        "201":
          description: Notification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'

components:
  schemas:
    Notification:
      type: object
      properties:
        id:
          type: integer
        severity:
          type: string
        description:
          type: string
        timestamp:
          type: string
          format: date-time

    NotificationCreate:
      type: object
      required:
        - severity
        - description
      properties:
        severity:
          type: string
        description:
          type: string

syntax = "proto3";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

message Feedback {
  string username = 1;
  int32 drug_id = 2;
  string feedback = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message SubmitFeedbackRequest {
  Feedback feedback = 1;
}

enum StatusCode {
  SUCCESS = 0;
  ERROR = 1;
  INVALID_INPUT = 2;
  NOT_FOUND = 3;
}

message SubmitFeedbackResponse {
  string message = 1;
  StatusCode status_code = 2;
}

message DrugFeedbackRequest {
  int32 drug_id = 1;
}

message DrugFeedbackResponse {
  repeated Feedback feedbacks = 1;
}

message UserFeedbackRequest {
  string username = 1;
}

message UpdateFeedbackRequest {
  string username = 1;
  int32 drug_id = 2;
  string new_feedback = 3;
}

message DeleteFeedbackRequest {
  string username = 1;
  int32 drug_id = 2;
}

message Response {
  string message = 1;
  StatusCode status_code = 2;
}

message ListAllFeedbacksResponse {
  repeated Feedback feedbacks = 1;
}

service FeedbackService {
  rpc SubmitFeedback (SubmitFeedbackRequest) returns (SubmitFeedbackResponse);
  rpc GetDrugFeedback (DrugFeedbackRequest) returns (DrugFeedbackResponse);
  rpc GetUserFeedbacks (UserFeedbackRequest) returns (DrugFeedbackResponse);
  rpc DeleteUserFeedbacks (UserFeedbackRequest) returns (Response);
  rpc UpdateFeedback (UpdateFeedbackRequest) returns (Response);
  rpc DeleteFeedback (DeleteFeedbackRequest) returns (Response);
  rpc ListAllFeedbacks (google.protobuf.Empty) returns (ListAllFeedbacksResponse);
}
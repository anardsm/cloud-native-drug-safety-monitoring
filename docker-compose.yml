services:
  user-service:
    build:
      context: ./user-service
    ports:
      - "5000:5000"  
    env_file:
      - .env
    networks:
      - app-network

  feedback-service:
    build:
      context: ./user-feedback-service
    ports:
      - "5001:5000" 
    env_file:
      - .env
    networks:
      - app-network
      
  adverse-events-service:
    build: ./adverse-events-service
    ports:
      - "8080:8000"
    depends_on:
      - db
    restart: on-failure

  notification-service:
    build: ./notification-service
    ports:
      - "8081:8001"
    depends_on:
      - db
    restart: on-failure

networks:
  app-network:
    driver: bridge

